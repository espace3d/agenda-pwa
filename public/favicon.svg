<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a1a1a"/>
  <!-- Calendar body -->
  <rect x="96" y="140" width="320" height="280" rx="28" fill="none" stroke="#fff" stroke-width="22"/>
  <!-- Calendar header bar -->
  <rect x="96" y="140" width="320" height="80" rx="28" fill="#fff"/>
  <rect x="96" y="192" width="320" height="28" fill="#fff"/>
  <!-- Rings -->
  <rect x="176" y="108" width="22" height="64" rx="11" fill="#fff"/>
  <rect x="314" y="108" width="22" height="64" rx="11" fill="#fff"/>
  <!-- Day number -->
  <text x="256" y="360" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="150" font-weight="700" fill="#fff">23</text>
</svg>
